<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algorithm Settings</title>
  <link rel="stylesheet" href="/src/style.css" />
  <style>
    body { padding: 20px; }
    #settings-page { display: flex; flex-direction: column; gap: 14px; }
    #settings-page h2 {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #7aa3ff, #b48aff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body>
  <div id="settings-page">
    <h2>Algorithm Visibility</h2>
    <p class="settings-hint">Toggle which algorithms appear in the main list.</p>
    <div id="settings-list"></div>
    <div id="settings-footer">
      <button id="settings-select-all">Select All</button>
      <button id="settings-deselect-all">Deselect All</button>
      <button id="settings-save" class="primary">Save</button>
    </div>
  </div>
  <script type="module" src="/src/settings.js"></script>
</body>
</html>
