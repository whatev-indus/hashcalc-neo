<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HashCalc Neo</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>HashCalc Neo <span class="header-sub">✶ Drag 'n' Drop or <span id="header-browse" class="browse-link">Click to Select File</span></span></h1>
      <button id="settings-btn" title="Algorithm Settings" aria-label="Open algorithm settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Inline settings panel -->
    <div id="settings-panel" class="hidden">
      <div id="settings-panel-list"></div>
    </div>

    <!-- Algorithm rows with inline hash results -->
    <div id="algo-section">
      <div id="size-row" class="algo-row hidden">
        <span class="algo-spacer"></span>
        <span class="algo-name">Size</span>
        <div id="size-value" class="hash-box" title="Click to copy">—</div>
      </div>
      <div id="algo-list"></div>
    </div>

    <!-- Progress -->
    <div id="progress-wrap" class="hidden">
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <span id="progress-label">Computing...</span>
    </div>

    <footer id="app-footer">
      <a href="https://sites.google.com/view/whateverindustries/home" target="_blank" rel="noopener noreferrer">whatev.indus</a>
    </footer>
  </div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
