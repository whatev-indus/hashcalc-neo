name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm install

      - run: npm run tauri build -- --bundles app

      - name: Package and publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP_PATH=$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name "*.app" | head -1)
          codesign --force --deep --sign - "$APP_PATH"
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ZIP_NAME="HashCalc.Neo_${VERSION}_macOS.zip"
          ditto -c -k --sequester-rsrc --keepParent "$APP_PATH" "$ZIP_NAME"
          gh release create "${{ github.ref_name }}" \
            --title "HashCalc Neo ${{ github.ref_name }}" \
            --notes "Download the appropriate file for your platform below.

> ⚠️ Windows & Linux builds not yet tested.

> **macOS:** If macOS blocks the app, right-click → Open to bypass Gatekeeper." \
            --draft \
            "$ZIP_NAME" \
            || gh release upload "${{ github.ref_name }}" "$ZIP_NAME" --repo "${{ github.repository }}" --clobber

  build-windows-linux:
    needs: build-macos
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: '--bundles appimage'
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'HashCalc Neo ${{ github.ref_name }}'
          releaseBody: |
            Download the appropriate file for your platform below.

            > ⚠️ Windows & Linux builds not yet tested.

            > **macOS:** If macOS blocks the app, right-click → Open to bypass Gatekeeper.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
