name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--bundles app'
          - platform: ubuntu-22.04
            args: '--bundles appimage'
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'HashCalc Neo ${{ github.ref_name }}'
          releaseBody: |
            Download the appropriate file for your platform below.

            > ⚠️ Windows & Linux builds not yet tested.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Repackage macOS build as zip
        if: matrix.platform == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP_PATH=$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name "*.app" | head -1)
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ZIP_NAME="HashCalc.Neo_${VERSION}_mac_arm.zip"
          cd "$(dirname "$APP_PATH")"
          zip -r "$ZIP_NAME" "$(basename "$APP_PATH")"
          cd -
          gh release upload "${{ github.ref_name }}" "src-tauri/target/release/bundle/macos/$ZIP_NAME" --repo "${{ github.repository }}" --clobber
          for asset in $(gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" --json assets -q '.assets[].name' | grep '\.tar\.gz$'); do
            gh release delete-asset "${{ github.ref_name }}" "$asset" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          done
